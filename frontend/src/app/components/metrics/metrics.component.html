<section id="metrics" class="metrics-section" data-nav="theme-dark">
  <div class="metrics-container reveal">
    <div class="metric-card" *ngFor="let metric of metrics; let i = index" [style.animation-delay]="i * 0.1 + 's'">
      <div class="icon-container">
        <i [class]="metric.icon"></i>
      </div>
      <h3 class="metric-value">{{ metric.value }}</h3>
      <p class="metric-label">{{ metric.label }}</p>
    </div>
  </div>
</section>
