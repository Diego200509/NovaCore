<section id="nosotros" data-nav="theme-dark">
  <h2 class="section-title reveal">Conoce a Nuestro Equipo</h2>
  
  <div class="swiper-container-wrapper team-wrapper reveal">
    <div class="swiper teamSwiper">
      <div class="swiper-wrapper">
        @for (member of teamMembers; track member.name) {
          <div class="swiper-slide">
            <app-card
              [imageUrl]="member.imageUrl"
              [imageAlt]="member.imageAlt"
              [title]="member.name"
              [description]="member.description"
              [buttonText]="'Ver más'"
              [buttonLink]="member.profileLink"
              [showButton]="true">
            </app-card>
          </div>
        }
      </div>
    </div>
    <button class="swiper-button-next team-next" aria-label="Siguiente">
      <svg class="nav-icon" viewBox="0 0 11 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0.38296 20.0762C0.111788 19.805 0.111788 19.3654 0.38296 19.0942L9.19758 10.2796L0.38296 1.46497C0.111788 1.19379 0.111788 0.754138 0.38296 0.482966C0.654131 0.211794 1.09379 0.211794 1.36496 0.482966L10.4341 9.55214C10.8359 9.9539 10.8359 10.6053 10.4341 11.007L1.36496 20.0762C1.09379 20.3474 0.654131 20.3474 0.38296 20.0762Z" fill="white"/>
      </svg>
    </button>
    <button class="swiper-button-prev team-prev" aria-label="Anterior">
      <svg class="nav-icon" viewBox="0 0 11 20" fill="none" xmlns="http://www.w3.org/2000/svg" style="transform: scaleX(-1)">
        <path d="M0.38296 20.0762C0.111788 19.805 0.111788 19.3654 0.38296 19.0942L9.19758 10.2796L0.38296 1.46497C0.111788 1.19379 0.111788 0.754138 0.38296 0.482966C0.654131 0.211794 1.09379 0.211794 1.36496 0.482966L10.4341 9.55214C10.8359 9.9539 10.8359 10.6053 10.4341 11.007L1.36496 20.0762C1.09379 20.3474 0.654131 20.3474 0.38296 20.0762Z" fill="white"/>
      </svg>
    </button>
    <div class="swiper-pagination team-pagination"></div>
  </div>
</section>
