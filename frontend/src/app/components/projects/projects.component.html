<!-- Modal fuera de .projects-section para que position:fixed sea respecto al viewport (la section tiene transform) -->
<app-project-modal
  [project]="selectedProject()"
  [isOpen]="projectModalOpen()"
  (close)="closeProjectModal()">
</app-project-modal>

<section class="projects-section" id="proyectos">
  <div class="projects-container">
    <!-- Header Section -->
    <div class="projects-header">
      <h1 class="projects-title">
        <span class="title-main">Nuestros</span>
        <span class="title-highlight">Proyectos</span>
      </h1>
      <p class="projects-subtitle">
        Cada proyecto representa aprendizaje, colaboración y evolución como equipo.
      </p>
    </div>

    <!-- Filter Buttons + Grid (animación solo aquí, no el título) -->
    <div class="page-content-reveal">
    <div class="projects-filters">
      <button 
        class="filter-btn" 
        [class.active]="selectedFilter() === 'todos'"
        (click)="setFilter('todos')">
        Todos
      </button>
      <button 
        class="filter-btn" 
        [class.active]="selectedFilter() === 'completado'"
        (click)="setFilter('completado')">
        Completado
      </button>
      <button 
        class="filter-btn" 
        [class.active]="selectedFilter() === 'en-progreso'"
        (click)="setFilter('en-progreso')">
        En Progreso
      </button>
      <button 
        class="filter-btn" 
        [class.active]="selectedFilter() === 'planificado'"
        (click)="setFilter('planificado')">
        Planificado
      </button>
    </div>

    <!-- Projects Grid -->
    <div class="projects-grid">
      <div 
        *ngFor="let project of filteredProjects(); trackBy: trackByProjectId" 
        class="project-card">
        
        <!-- Project Image -->
        <div class="project-image-container">
          <img [src]="project.image" [alt]="project.title" class="project-image" />
          <div class="project-img-overlay"></div>
          <div class="project-badge" [ngClass]="getStatusBadgeClass(project.status)">
            <i class="fas" [ngClass]="getStatusIcon(project.status)"></i>
            <span>{{ getStatusText(project.status) }}</span>
          </div>
        </div>

        <!-- Project Content -->
        <div class="project-content">
          <h3 class="project-title">{{ project.title }}</h3>
          <p class="project-description">{{ project.description }}</p>
          
          <!-- Technologies Tags -->
          <div class="project-technologies">
            <span 
              *ngFor="let tech of project.technologies" 
              class="tech-tag">
              {{ tech }}
            </span>
          </div>

          <!-- Ver detalles abre modal (mismo estilo que servicios) -->
          <button 
            class="expand-btn"
            type="button"
            (click)="openProjectModal(project); $event.stopPropagation()">
            <span>Ver detalles</span>
            <i class="fas fa-arrow-right"></i>
          </button>
        </div>
      </div>
    </div>
    </div>
  </div>
</section>
